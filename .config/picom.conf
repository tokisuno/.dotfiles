blur-kern       = "3x3box";
blur-background-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'",
    "class_g = 'firefox' && window_type = 'utility'",
	"_GTK_FRAME_EXTENTS@:c"
];

fading = false;
fading-delta = 10;
fade-in-step = 0.2;
face-out-step = 0.2;
