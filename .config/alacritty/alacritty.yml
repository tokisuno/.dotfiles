# The definition of color schemes.
# fonts i like
# MesloLGS NF (any)
# Victor Mono NF (AUR)
# JetBrains Mono NF (AUR)

font:
  normal: 
    family: Victor Mono NF
    style: Regular
  size: 12

window:
  padding:
    x: 0
    y: 0

tabspaces: 4

env:
  WINIT_HIDPI_FACTOR: "1.0"
  WINIT_X11_SCALE_FACTOR: "1.0"

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>"

# Colors (Arc Dark)
colors:
  # Default colors
  primary:
    background: '0x383c4a'
    foreground: '0xd3dae3'

  # Normal colors
  normal:
    black:   '0x4b5164'
    red:     '0xe14245'
    green:   '0x5ca75b'
    yellow:  '0xf6ab32'
    blue:    '0x4877b1'
    magenta: '0xa660c3'
    cyan:    '0x5294e2'
    white:   '0xa9a9aa'

  # Bright colors
  bright:
    black:   '0x616981'
    red:     '0xe16f7e'
    green:   '0xadd488'
    yellow:  '0xfdc35f'
    blue:    '0x8ca9bf'
    magenta: '0xe2afec'
    cyan:    '0x73c5e2'
    white:   '0xfcfcfc'

  # Dim colors (Optional)
  dim:
    black:   '0x2c2f3a'
    red:     '0x783228'
    green:   '0x4b7c16'
    yellow:  '0xb65619'
    blue:    '0x2b486b'
    magenta: '0x614a73'
    cyan:    '0x1b668f'
    white:   '0x63686d'
